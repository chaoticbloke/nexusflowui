<div class="d-flex h-100">
  <nav class="navbar-side bg-dark text-white" [class.sidebar-collapse]="!sidebarOpen()">
    <div class="p-3">
      <h5 class="mb-4">
        <i class="bi bi-lightning-fill"></i> @if (sidebarOpen()) { NexusFlow }
      </h5>

      <ul class="nav flex-column gap-2">
        <li class="nav-item">
          <a routerLink="/dashboard" routerLinkActive="active" class="nav-link text-white" (click)="sidebarOpen.set(false)">
            <i class="bi bi-speedometer2"></i>
            @if (sidebarOpen()) { <span class="ms-2">Dashboard</span> }
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/customers" routerLinkActive="active" class="nav-link text-white" (click)="sidebarOpen.set(false)">
            <i class="bi bi-people-fill"></i>
            @if (sidebarOpen()) { <span class="ms-2">Customers</span> }
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/invoices" routerLinkActive="active" class="nav-link text-white" (click)="sidebarOpen.set(false)">
            <i class="bi bi-receipt"></i>
            @if (sidebarOpen()) { <span class="ms-2">Invoices</span> }
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="flex-grow-1 d-flex flex-column">
    <header class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center">
      <button type="button" class="btn btn-outline-secondary" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>

      <ul class="navbar-nav">
        @if ( authService.isLoggedIn()) {
              <li class="nav-item dropdown">
                    <button
                      class="nav-link dropdown-toggle btn btn-link text-dark text-decoration-none"
                      type="button"
                      (click)="toggleDropdown()">
                      <i class="bi bi-person-circle me-2"></i>

                      {{ (( authService.user()?.firstName ?? '') + ' ' + (authService.user()?.lastName ?? '')) | titlecase }}
                    </button>

                <ul class="dropdown-menu dropdown-menu-end shadow-sm"
                    [class.show]="isDropdownOpen()">
                  <li><a class="dropdown-item" routerLink="/profile" (click)="closeDropdown()">Profile</a>
                  </li>
                  <li><hr class="dropdown-divider"></li>
                  <li><button class="dropdown-item" (click)="logout()">Settings</button></li>
                                    <li><a class="dropdown-item" routerLink="/profile"
                                      (click)="closeDropdown()">About</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><button class="dropdown-item text-danger" (click)="logout()">Logout</button></li>
                </ul>
              </li>
        } @else {
          <ul class="navbar-nav d-flex flex-row gap-2">
            <li class="nav-item">
              <a class="btn btn-outline-primary btn-sm" routerLink="/login">Login</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-primary btn-sm" routerLink="/register">Register</a>
            </li>
          </ul>
        }
      </ul>
    </header>

    <main class="flex-grow-1 p-4 bg-light overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
